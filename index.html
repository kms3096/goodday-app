<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoodDay</title>
  <style>
    :root{--bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8;--accent:#22c55e; --blue:#3b82f6; --amber:#f59e0b; --red:#ef4444}
    body{font-family:system-ui;margin:0;padding:16px;background:var(--bg);color:var(--text)}
    .container{max-width:560px;margin:auto}
    .card{background:var(--card);padding:14px;border-radius:16px;margin-bottom:10px}
    .row{display:flex;justify-content:space-between;align-items:center}
    .muted{color:var(--muted);font-size:12px}
    button{border:0;border-radius:10px;padding:8px 10px;cursor:pointer}
    .ok{background:var(--accent)} .start{background:var(--blue)} .pause{background:var(--amber)} .del{background:var(--red)}
    .xp{height:10px;background:#334155;border-radius:999px;overflow:hidden}
    .xp-bar{height:100%;background:#22c55e;width:0%}
    input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #334155;background:#020617;color:#fff}
    .tabs{display:flex;gap:8px;margin-bottom:10px}
    .tab{flex:1;text-align:center;padding:8px;background:#020617;border-radius:10px;cursor:pointer}
    .active{background:#22c55e;color:#000}
  </style>
</head>
<body>
<div class="container">

<div class="tabs">
  <div class="tab active" onclick="setView('home')">Home</div>
  <div class="tab" onclick="setView('progress')">Progresso</div>
</div>

<div id="home">
  <h3>FOCO AGORA</h3>
  <div class="card" id="foco"></div>
  <div class="xp"><div class="xp-bar" id="xpBar"></div></div>

  <h3>Energia</h3>
  <button onclick="setEnergia('BAIXA')">😴</button>
  <button onclick="setEnergia('NORMAL')">😐</button>
  <button onclick="setEnergia('ALTA')">🔥</button>

  <h3>Nova tarefa</h3>
  <input id="nome" placeholder="Nome" />
  <input id="hora" type="number" placeholder="Hora" />
  <select id="tipo">
    <option value="LEVE">Leve</option>
    <option value="MODERADO">Moderado</option>
    <option value="INTENSO">Intenso</option>
  </select>
  <button onclick="addTask()">Adicionar</button>

  <h3>Tarefas</h3>
  <div id="tasks"></div>
</div>

<div id="progress" style="display:none">
  <h3>Progresso</h3>
  <div class="card">XP Total: <span id="xpTotal"></span></div>
  <div class="card" id="historico"></div>
</div>

</div>

<script>
let view='home'
let energia=localStorage.getItem('energia')||'NORMAL'
let xp=parseInt(localStorage.getItem('xp')||'0')
let historico=JSON.parse(localStorage.getItem('hist')||'[]')
let tasks=JSON.parse(localStorage.getItem('tasks')||'[]')
if(tasks.length===0){tasks=[{id:1,nome:'Estudar',tipo:'INTENSO',hora:14,status:'PENDENTE'}]}

function setView(v){view=v;document.getElementById('home').style.display=v==='home'?'block':'none';document.getElementById('progress').style.display=v==='progress'?'block':'none'}

function salvar(){localStorage.setItem('tasks',JSON.stringify(tasks));localStorage.setItem('xp',xp);localStorage.setItem('energia',energia);localStorage.setItem('hist',JSON.stringify(historico))}

function peso(tipo){return energia==='ALTA'?{LEVE:1,MODERADO:2,INTENSO:3}[tipo]:energia==='BAIXA'?{LEVE:3,MODERADO:2,INTENSO:1}[tipo]:{LEVE:2,MODERADO:3,INTENSO:2}[tipo]}

function foco(){return tasks.filter(t=>t.status!=='CONCLUIDO').sort((a,b)=>peso(b.tipo)-peso(a.tipo))[0]}

function render(){
  const f=foco();
  document.getElementById('foco').innerText=f?f.nome:'Nada';
  document.getElementById('xpBar').style.width=xp+'%'

  const el=document.getElementById('tasks');el.innerHTML=''
  tasks.forEach(t=>{
    const d=document.createElement('div');d.className='card'
    d.innerHTML=`${t.nome} <div>
    <button onclick='start(${t.id})'>▶</button>
    <button onclick='pause(${t.id})'>⏸</button>
    <button onclick='done(${t.id})'>✔</button></div>`
    el.appendChild(d)
  })

  document.getElementById('xpTotal').innerText=xp
  document.getElementById('historico').innerHTML=historico.map(h=>`<div>${h}</div>`).join('')

  salvar()
}

function start(id){tasks.forEach(t=>t.status=t.id===id?'EM_ANDAMENTO':'PAUSADO');render()}
function pause(id){tasks.find(t=>t.id===id).status='PAUSADO';render()}
function done(id){
  let t=tasks.find(x=>x.id===id)
  t.status='CONCLUIDO'
  let ganho=t.tipo==='LEVE'?10:t.tipo==='MODERADO'?25:50
  xp+=ganho;if(xp>100)xp=100
  historico.push(`${t.nome} concluído (+${ganho} XP)`)
  render()
}

function setEnergia(e){energia=e;render()}

function addTask(){
  let nome=document.getElementById('nome').value
  let hora=parseInt(document.getElementById('hora').value)
  let tipo=document.getElementById('tipo').value
  if(!nome||isNaN(hora))return alert('Preencha')
  tasks.push({id:Date.now(),nome,tipo,hora,status:'PENDENTE'})
  render()
}

// Simulação de inteligência
setInterval(()=>{
  if(tasks.length>4){alert('Muitas tarefas! Foque em menos.')}
},10000)

render()
</script>
</body>
</html>
