<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoodDay</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>🌞 GoodDay</h1>

    <!-- CRIAR TAREFA -->
    <div class="card">
      <h3>Nova tarefa</h3>

      <input 
        type="text" 
        id="taskInput" 
        placeholder="Digite sua tarefa..."
      >

      <select id="difficulty">
        <option value="facil">Fácil</option>
        <option value="media">Média</option>
        <option value="dificil">Difícil</option>
      </select>

      <button onclick="addTask()">Adicionar</button>
    </div>

    <!-- LISTA DE TAREFAS -->
    <div class="card">
      <h3>Suas tarefas</h3>
      <div id="taskList"></div>
    </div>

    <!-- TIMELINE / PROGRESSO -->
    <div class="card">
      <h3>Progresso do Dia</h3>
      <p id="streak">🔥 Streak: 0 dias</p>
      <div id="historyList" class="timeline"></div>
    </div>

  </div>

  <!-- POPUP XP -->
  <div id="xpPopup" class="xp-popup"></div>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
