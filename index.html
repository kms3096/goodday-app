<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>GoodDay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- XP BAR -->
  <div class="xp-bar">
    <div class="xp-fill" id="xpFill"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <header>
      <h1>GoodDay</h1>
      <p id="greeting">Bom dia 👋</p>
    </header>

    <!-- MOOD -->
    <section class="mood">
      <button onclick="setMood('leve')">🙂 Leve</button>
      <button onclick="setMood('moderado')">😐 Moderado</button>
      <button onclick="setMood('intenso')">🔥 Intenso</button>
    </section>

    <!-- FOCUS CARD -->
    <section class="card focus">
      <h2>Foco do momento</h2>
      <p id="focusTask">Escolha seu estado</p>
      <p id="timer">00:00</p>
      <div class="actions">
        <button onclick="startTask()">▶ Iniciar</button>
        <button onclick="pauseTask()">⏸ Pausar</button>
      </div>
    </section>

    <!-- TASK LIST -->
    <section class="card">
      <h3>Tarefas</h3>
      <ul id="taskList"></ul>
    </section>
    
    <section class="card">
      <h3>Progresso</h3>
      <p id="streak">🔥 Streak: 0 dias</p>
      <div id="historyList" class="timeline"></div>
    </section>
    
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
